<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meditation Timer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
    }
    h1 {
      margin-top: 30px;
    }
    .timer {
      font-size: 48px;
      margin-top: 30px;
    }
    button {
      font-size: 24px;
      margin-top: 20px;
      padding: 10px 20px;
    }
    label, select, input {
      display: block;
      margin: 10px auto;
      max-width: 100%;
      width: 300px;
    }
  </style>
</head>
<body>
  <h1>Meditation Timer</h1>
  
  <label for="time">Enter time to meditate (min:sec):</label>
  <input type="text" id="time" placeholder="00:00">
  
  <label for="subdivision">Select subdivision:</label>
  <select id="subdivision">
    <option value="1">None</option>
    <option value="2">Halves</option>
    <option value="4">Quarters</option>
    <!-- Add more options as needed -->
  </select>
  
  <div class="timer">00:00</div>
  
  <button id="startButton">Start</button>
  
  <!-- Audio element for bell sound -->
  <audio id="bellAudio">
    <source src="bell.mp3" type="audio/mpeg">
  </audio>
  
  <script>
    // Timer variables
    let timerInterval;
    let totalTime;
    let startTime;
    let subdivision;
    let intervalCount = 0;
    
    // Get HTML elements
    const timerElement = document.querySelector('.timer');
    const startButton = document.querySelector('#startButton');
    const bellAudio = document.querySelector('#bellAudio');
    const timeInput = document.querySelector('#time');
    
    // Event listener for start button
    startButton.addEventListener('click', function() {
      // Get selected time and subdivision values
      const timeParts = timeInput.value.split(':');
      const minutes = parseFloat(timeParts[0]);
      const seconds = parseFloat(timeParts[1]);
      totalTime = (isNaN(minutes) ? 0 : minutes) * 60 + (isNaN(seconds) ? 0 : seconds);
      startTime = totalTime;
      subdivision = parseInt(document.querySelector('#subdivision').value, 10);
      intervalCount = Math.floor(totalTime / subdivision);
      
      // Disable the start button
      startButton.disabled = true;
      
      // Update the timer display every second
      timerInterval = setInterval(function() {
        const minutes = Math.floor(totalTime / 60).toString().padStart(2, '0');
        const seconds = (totalTime % 60).toString().padStart(2, '0');
        timerElement.textContent = `${minutes}:${seconds}`;
        
        // Check if subdivision interval is reached and play the bell sound
        if (totalTime > 0 && totalTime % intervalCount === 0 && totalTime != startTime) {
          bellAudio.play();
        }
        
        // Check if the timer has reached zero
        if (totalTime === 0) {
          // Stop the timer
          clearInterval(timerInterval);
          timerElement.textContent = '00:00';
          startButton.disabled = false;
          bellAudio.play();
        }
        
        totalTime--;
      }, 1000);
    });
      </script>
</body>
</html>
